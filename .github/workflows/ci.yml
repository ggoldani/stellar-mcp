name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify base
        run: npm run verify:base

      - name: Smoke phase foundation
        run: npm run smoke:phase1

      - name: Smoke autonomy mock
        run: npm run smoke:autonomy:mock
